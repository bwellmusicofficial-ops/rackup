<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Rack Up</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .back-link {
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 32px;
      transition: color 0.15s;
    }

    .back-link:hover { color: #ff7a3d; }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f5f5f5 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subhead {
      font-size: 15px;
      color: #999;
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
    }

    .form input {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #161616;
      color: #f5f5f5;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .form input:focus { border-color: #ff7a3d; }
    .form input::placeholder { color: #555; }

    .form button {
      padding: 14px 16px;
      border-radius: 10px;
      border: none;
      background: #ff7a3d;
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
      margin-top: 8px;
      font-family: inherit;
    }

    .form button:hover:not(:disabled) { opacity: 0.9; }
    .form button:active:not(:disabled) { transform: scale(0.98); }
    .form button:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }

    .message.success { color: #4ade80; }
    .message.error { color: #ef4444; }

    .signup-link {
      margin-top: 28px;
      text-align: center;
      font-size: 14px;
      color: #888;
    }

    .signup-link a {
      color: #ff7a3d;
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <main class="container">
    <a href="/" class="back-link">← Back to home</a>
    <div class="logo">Rack Up</div>
    <h1>Welcome back.</h1>
    <p class="subhead">Log in to see your PBs.</p>

    <form class="form" id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
      </div>

      <button type="submit" id="submit-btn">Log in</button>
    </form>

    <div class="message" id="message"></div>

    <div class="signup-link">
      Don't have an account? <a href="/signup.html">Sign up</a>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://cicgsscaoquecwhegsrb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yqYCJitzPATD_Wmjt40oTA_dbDeNYe_';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, go straight to dashboard
    const { data: { user } } = await supabase.auth.getUser();
    if (user) window.location.href = '/dashboard.html';

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      message.textContent = '';
      message.className = 'message';

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          message.textContent = 'Incorrect email or password. Try again.';
          message.className = 'message error';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in';
          return;
        }

        message.textContent = 'Logged in. Taking you to your dashboard...';
        message.className = 'message success';

        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 800);

      } catch (err) {
        console.error(err);
        message.textContent = 'Something went wrong. Try again.';
        message.className = 'message error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });
  </script>

</body>
</html>
