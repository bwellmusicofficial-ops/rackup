<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Rack Up</title>
  <meta name="description" content="Create your Rack Up account. Track your PBs and see how you compare.">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }

    .container {
      max-width: 420px;
      width: 100%;
    }

    .back-link {
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 32px;
      transition: color 0.15s;
    }

    .back-link:hover { color: #ff7a3d; }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f5f5f5 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subhead {
      font-size: 15px;
      color: #999;
      margin-bottom: 32px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
    }

    .form input {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #161616;
      color: #f5f5f5;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .form input:focus { border-color: #ff7a3d; }
    .form input::placeholder { color: #555; }

    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .form button {
      padding: 14px 16px;
      border-radius: 10px;
      border: none;
      background: #ff7a3d;
      color: #0a0a0a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
      margin-top: 8px;
    }

    .form button:hover:not(:disabled) { opacity: 0.9; }
    .form button:active:not(:disabled) { transform: scale(0.98); }
    .form button:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }

    .message.success { color: #4ade80; }
    .message.error { color: #ef4444; }

    .login-link {
      margin-top: 28px;
      text-align: center;
      font-size: 14px;
      color: #888;
    }

    .login-link a {
      color: #ff7a3d;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { text-decoration: underline; }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <main class="container">
    <a href="/" class="back-link">← Back to home</a>
    <div class="logo">Rack Up</div>
    <h1>Create your account</h1>
    <p class="subhead">Track your PBs and see how you stack up.</p>

    <form class="form" id="signup-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        <div class="help-text">Minimum 6 characters.</div>
      </div>

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <div class="message" id="message"></div>

    <div class="login-link">
      Already have an account? <a href="/login.html">Log in</a>
    </div>

    <div class="footer-note">
      By creating an account, you agree to be a part of the Rack Up community. We'll never share your email.
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://cicgsscaoquecwhegsrb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yqYCJitzPATD_Wmjt40oTA_dbDeNYe_';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('signup-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!email || !password) return;
      if (password.length < 6) {
        message.textContent = 'Password must be at least 6 characters.';
        message.className = 'message error';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      message.textContent = '';
      message.className = 'message';

      try {
        // Step 1: Create the auth user
        const { data: authData, error: authError } = await supabase.auth.signUp({
          email: email,
          password: password,
        });

        if (authError) {
          if (authError.message.toLowerCase().includes('already')) {
            message.textContent = 'An account with this email already exists. Try logging in instead.';
            message.className = 'message error';
          } else {
            message.textContent = authError.message;
            message.className = 'message error';
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create account';
          return;
        }

        // Step 2: Create a matching row in the users table
        if (authData.user) {
          const { error: userError } = await supabase
            .from('users')
            .insert([{
              id: authData.user.id,
              email: email
            }]);

          if (userError) {
            console.error('Could not create user profile:', userError);
            // Don't block signup if this fails — we can fix it later
          }
        }

        // Success
        message.textContent = "You're in! Redirecting...";
        message.className = 'message success';

        setTimeout(() => {
          window.location.href = '/welcome.html';
        }, 1200);

      } catch (err) {
        console.error(err);
        message.textContent = 'Something went wrong. Try again in a moment.';
        message.className = 'message error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>

</body>
</html>
